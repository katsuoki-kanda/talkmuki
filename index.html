<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face Direction Talking Aid - Adjusted</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            font-size: 150%; 
        }
        #ui-layer {
            position: absolute;
            bottom: 5px;
            right: 15px;
            z-index: 100;
            color: white;
            background: rgba(0, 0, 0, 0.7);
            padding: 4px 12px;
            border-radius: 15px;
            pointer-events: none;
            font-size: 40%;
            display: flex;
            gap: 15px;
            white-space: nowrap;
        }
        canvas#output_canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            transform: scaleX(-1);
            z-index: 1;
            opacity: 0.5;
        }
        video#input_video {
            display: none;
        }
        #talking-aid-container {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            bottom: 30px; 
            background: rgba(255, 255, 255, 0.2); 
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 15px;
            z-index: 10;
        }
        #textarea {
            width: 100%;
            height: 120px;
            font-size: 170%; 
            border: 2px solid rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            padding: 10px 15px;
            box-sizing: border-box;
            background: rgba(255, 255, 255, 0.8); 
            color: black;
            resize: none;
        }
        #keyboard-grid {
            display: grid;
            grid-template-columns: repeat(11, 1fr);
            grid-template-rows: repeat(6, 1fr);
            gap: 8px;
            flex: 1;
        }
        .key {
            background: rgba(255, 255, 255, 0.7); 
            border: 3px solid transparent;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 140%;
            font-weight: bold;
            color: #000;
            box-sizing: border-box;
            transition: all 0.1s;
        }
        .key.active {
            border-color: #ff0000;
            background: #fffb00;
            transform: scale(1.05);
            z-index: 20;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.8);
        }
        .key-special {
            background: rgba(253, 246, 242, 0.8);
            color: #b7574a;
            font-size: 90%;
        }
        .stopped {
            opacity: 0.5;
            filter: grayscale(1);
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="status">システム起動中...</div>
        <div id="mode-display">モード: 顔向き操作</div>
    </div>

    <video id="input_video"></video>
    <canvas id="output_canvas"></canvas>

    <div id="talking-aid-container">
        <textarea id="textarea" readonly placeholder="入力待ち"></textarea>
        <div id="keyboard-grid">
            <div class="key key-special">話す</div>
            <div class="key">あ</div> <div class="key">か</div> <div class="key">さ</div> <div class="key">た</div> <div class="key">な</div> <div class="key">は</div> <div class="key">ま</div> <div class="key">や</div> <div class="key">ら</div> <div class="key">わ</div>
            
            <div class="key key-special">一字消</div>
            <div class="key">い</div> <div class="key">き</div> <div class="key">し</div> <div class="key">ち</div> <div class="key">に</div> <div class="key">ひ</div> <div class="key">み</div> <div class="key">、</div> <div class="key">り</div> <div class="key">を</div>
            
            <div class="key key-special">全消去</div>
            <div class="key">う</div> <div class="key">く</div> <div class="key">す</div> <div class="key">つ</div> <div class="key">ぬ</div> <div class="key">ふ</div> <div class="key">む</div> <div class="key">ゆ</div> <div class="key">る</div> <div class="key">ん</div>
            
            <div class="key key-special">゛</div>
            <div class="key">え</div> <div class="key">け</div> <div class="key">せ</div> <div class="key">て</div> <div class="key">ね</div> <div class="key">へ</div> <div class="key">め</div> <div class="key">。</div> <div class="key">れ</div> <div class="key key-special">空白</div>
            
            <div class="key key-special">゜</div>
            <div class="key">お</div> <div class="key">こ</div> <div class="key">そ</div> <div class="key">と</div> <div class="key">の</div> <div class="key">ほ</div> <div class="key">も</div> <div class="key">よ</div> <div class="key">ろ</div> <div class="key key-special">小文字</div>
            
            <div class="key">1</div> <div class="key">2</div> <div class="key">3</div> <div class="key">4</div> <div class="key">5</div> <div class="key">6</div> <div class="key">7</div> <div class="key">8</div> <div class="key">9</div> <div class="key">0</div> <div class="key key-special">リセット</div>
        </div>
    </div>

<script>
const videoElement = document.getElementById('input_video');
const canvasElement = document.getElementById('output_canvas');
const canvasCtx = canvasElement.getContext('2d');
const statusDiv = document.getElementById('status');
const textarea = document.getElementById('textarea');
const keys = document.querySelectorAll('.key');

const COL_COUNT = 11;
const ROW_COUNT = 6;
// スキャン速度を1.5倍遅く設定 (450 * 1.5 = 675)
const ACTION_COOL_DOWN = 675; 

let lastActionTime = 0;
let isCalibrated = false;
let isWaitingToCalibrate = false; // リセット後の待機フラグ
let isRunning = true;
let calibrationData = {};
let currentRow = 0;
let currentCol = 0;

const dakutenMap = {'か':'が','き':'ぎ','く':'ぐ','け':'げ','こ':'ご','さ':'ざ','し':'じ','す':'ず','せ':'ぜ','そ':'ぞ','た':'だ','ち':'ぢ','つ':'づ','て':'で','と':'ど','は':'ば','ひ':'び','ふ':'ぶ','へ':'べ','ほ':'ぼ','が':'か','ぎ':'き','ぐ':'く','げ':'け','ご':'こ','ざ':'さ','じ':'し','ず':'す','ぜ':'ぜ','ぞ':'そ','だ':'た','ぢ':'ち','づ':'つ','て':'て','ど':'と','ば':'は','び':'ひ','ぶ':'ふ','べ':'へ','ぼ':'ほ'};
const handakutenMap = {'は':'ぱ','ひ':'ぴ','ふ':'ぷ','へ':'ぺ','ほ':'ぼ','ば':'ぱ','び':'ぴ','ぶ':'ぷ','べ':'ぺ','ぼ':'ほ','ぱ':'は','ぴ':'ひ','ぷ':'ふ','ぺ':'へ','ぽ':'ほ'};
const smallMap = {'あ':'ぁ','い':'ぃ','う':'ぅ','え':'ぇ','お':'ぉ','つ':'っ','や':'ゃ','ゆ':'ゅ','よ':'よ','わ':'ゎ','ぁ':'あ','ぃ':'い','ぅ':'う','ぇ':'え','ぉ':'お','っ':'つ','ゃ':'や','ゅ':'ゆ','ょ':'よ','ゎ':'わ'};

function speak(text) {
    if(!text) return;
    const uttr = new SpeechSynthesisUtterance(text);
    uttr.lang = 'ja-JP';
    window.speechSynthesis.speak(uttr);
}

function beep(freq = 800, duration = 50) {
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const oscillator = audioCtx.createOscillator();
    oscillator.type = 'sine';
    oscillator.frequency.setValueAtTime(freq, audioCtx.currentTime);
    oscillator.connect(audioCtx.destination);
    oscillator.start();
    oscillator.stop(audioCtx.currentTime + duration / 1000);
}

function updateHighlight() {
    keys.forEach(k => k.classList.remove('active'));
    const index = currentRow * COL_COUNT + currentCol;
    if (keys[index]) {
        keys[index].classList.add('active');
    }
    
    const container = document.getElementById('talking-aid-container');
    if (isRunning) {
        container.classList.remove('stopped');
    } else {
        container.classList.add('stopped');
    }
}

function onResults(results) {
    canvasCtx.save();
    canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
    canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

    if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
        const landmarks = results.multiFaceLandmarks[0];
        
        // --- キャリブレーション (顔の登録) ---
        if (!isCalibrated) {
            if (isWaitingToCalibrate) {
                statusDiv.innerText = "準備中... 口を閉じて正面を向いてください";
                canvasCtx.restore();
                return;
            }
            statusDiv.innerText = "正面を向いて登録中...";
            speak("正面を向いて。登録します。");

            calibrationData = {
                faceH: landmarks[152].y - landmarks[10].y,
                faceW: landmarks[454].x - landmarks[234].x,
                upperFaceH: landmarks[5].y - landmarks[10].y,
                lowerFaceH: landmarks[152].y - landmarks[5].y,
                mouthH2: landmarks[16].y - landmarks[11].y,
                puckerWidth: landmarks[270].x - landmarks[40].x
            };
            isCalibrated = true;
            speak("準備できました。");
            updateHighlight();
            canvasCtx.restore();
            return;
        }

        const now = performance.now();
        const currentFaceH = landmarks[152].y - landmarks[10].y;
        const currentFaceW = landmarks[454].x - landmarks[234].x;
        const hirituY = currentFaceH / calibrationData.faceH;
        const hirituX = currentFaceW / calibrationData.faceW;

        const mouthHH = (calibrationData.upperFaceH / calibrationData.lowerFaceH) / 
                        ((landmarks[5].y - landmarks[10].y) / (landmarks[152].y - landmarks[5].y));

        if (now - lastActionTime > ACTION_COOL_DOWN) {
            
            // --- 口すぼめ：一時停止 ---
            const currentPucker = landmarks[270].x - landmarks[40].x;
            if (currentPucker < calibrationData.puckerWidth * 0.82 * hirituX) {
                isRunning = !isRunning;
                beep(isRunning ? 800 : 400, 100);
                lastActionTime = now;
                updateHighlight();
                canvasCtx.restore();
                return;
            }

            if (!isRunning) {
                statusDiv.innerText = "停止中";
                canvasCtx.restore();
                return;
            }

            // --- 口を開ける：決定（リセット時もこれでクリックされる） ---
            const currentMouthOpen = landmarks[16].y - landmarks[11].y;
            if (currentMouthOpen > (calibrationData.mouthH2 * 2.2) * hirituY) {
                const index = currentRow * COL_COUNT + currentCol;
                keys[index].click();
                beep(300, 30);
                //beep(1000, 50);

                lastActionTime = now;
                canvasCtx.restore();
                return;
            }

            // --- 顔向き移動 ---
            if ((landmarks[454].x - landmarks[5].x) < (calibrationData.faceW * 0.4 * hirituX)) {
                currentCol = (currentCol - 1 + COL_COUNT) % COL_COUNT;
                beep(400, 30);
                //beep(600, 30);
                lastActionTime = now;
                updateHighlight();
            } else if ((landmarks[5].x - landmarks[234].x) < (calibrationData.faceW * 0.4 * hirituX)) {
                currentCol = (currentCol + 1) % COL_COUNT;
                beep(400, 30);
                lastActionTime = now;
                updateHighlight();
            } else if (mouthHH > 1.12) {
                currentRow = (currentRow - 1 + ROW_COUNT) % ROW_COUNT;
                beep(400, 30);
                lastActionTime = now;
                updateHighlight();
            } else if (mouthHH < 0.88) {
                currentRow = (currentRow + 1) % ROW_COUNT;
                beep(400, 30);
                lastActionTime = now;
                updateHighlight();
            }

            statusDiv.innerText = "準備完了";
        }
    }
    canvasCtx.restore();
}

function handleKeyAction(val) {
    const currentText = textarea.value;
    const lastChar = currentText.slice(-1);

    if (val === '話す') {
        speak(currentText);
    } else if (val === '一字消') {
        textarea.value = currentText.slice(0, -1);
    } else if (val === '全消去') {
        textarea.value = '';
    } else if (val === '空白') {
        textarea.value += ' ';
    } else if (val === '゛') {
        if (lastChar && dakutenMap[lastChar]) {
            textarea.value = currentText.slice(0, -1) + dakutenMap[lastChar];
        }
    } else if (val === '゜') {
        if (lastChar && handakutenMap[lastChar]) {
            textarea.value = currentText.slice(0, -1) + handakutenMap[lastChar];
        }
    } else if (val === '小文字') {
        if (lastChar && smallMap[lastChar]) {
            textarea.value = currentText.slice(0, -1) + smallMap[lastChar];
        }
    } else if (val === 'リセット') {
        // リセット処理：口を開けて決定した直後の再登録を防ぐため待機を入れる
        isCalibrated = false;
        isWaitingToCalibrate = true;
        statusDiv.innerText = "2秒後に再登録します...";
        speak("口を閉じて。");
        
        setTimeout(() => {
            isWaitingToCalibrate = false;
            // 登録の瞬間にまたアクションが起きないよう少しクールダウンを置く
            lastActionTime = performance.now();
        }, 2000);

    } else if (val.length === 1) {
        textarea.value += val;
    }
    textarea.scrollTop = textarea.scrollHeight;
}

keys.forEach(key => {
    key.addEventListener('click', () => handleKeyAction(key.innerText));
});

const faceMesh = new FaceMesh({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });
faceMesh.onResults(onResults);

const camera = new Camera(videoElement, {
    onFrame: async () => {
        canvasElement.width = window.innerWidth;
        canvasElement.height = window.innerHeight;
        await faceMesh.send({image: videoElement});
    },
    width: 1280, height: 720
});
camera.start();

</script>
</body>
</html>
